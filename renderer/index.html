<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Image Feast Organizer</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 30px;
        background: #f5f5f5;
        color: #222;
      }

      h1 {
        margin-bottom: 10px;
      }

      .box {
        background: white;
        padding: 20px;
        border-radius: 12px;
        margin-bottom: 20px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      button {
        padding: 12px 18px;
        border: none;
        border-radius: 8px;
        background: #222;
        color: white;
        cursor: pointer;
        font-size: 14px;
        margin-top: 10px;
      }

      button:hover {
        background: #444;
      }

      .path {
        margin-top: 10px;
        font-size: 14px;
        color: #555;
        word-break: break-all;
      }

      #status {
        white-space: pre-wrap;
        background: #111;
        color: #eee;
        padding: 15px;
        border-radius: 8px;
        min-height: 120px;
      }
    </style>
  </head>

  <body>
    <h1>Image Feast Organizer</h1>
    <p>
      This app copies images into folders based on photo date and Traditional
      Catholic feast day.
    </p>

    <div class="box">
      <h2>1. Select Image Dump Folder</h2>
      <button id="selectInput">Select Input Folder</button>
      <div id="inputPath" class="path">No folder selected</div>
    </div>

    <div class="box">
      <h2>2. Select Output Folder</h2>
      <button id="selectOutput">Select Output Folder</button>
      <div id="outputPath" class="path">No folder selected</div>
    </div>

    <div class="box">
      <h2>3. Organize Images</h2>
      <button id="organize">Copy Images Into Organized Folders</button>
    </div>

    <div class="box">
      <h2>Status</h2>
      <div id="status">Ready.</div>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
